<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クイズ大会ポイント計算システム</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="tournament-title" contenteditable="true">Quiz Points Master</h1>
            <p class="subtitle">12研究室対抗クイズ大会</p>
        </header>

        <main>
            <section class="scoreboard-section">
                <div class="section-header">
                    <h2>スコアボード</h2>
                    <div class="action-btns">
                        <button id="share-qr-btn" class="btn-secondary">QRで同期</button>
                        <button id="reset-btn" class="btn-secondary">全リセット</button>
                    </div>
                </div>
                <div id="scoreboard" class="scoreboard-grid">
                    <!-- 研究室ごとのスコアカードがここに入る -->
                </div>
            </section>

            <section class="history-section">
                <div class="section-header">
                    <h2>履歴</h2>
                    <div class="action-btns">
                        <button id="undo-btn" class="btn-secondary" disabled>1つ戻す</button>
                        <button id="export-btn" class="btn-secondary">CSV出力</button>
                    </div>
                </div>
                <div id="history-log" class="history-log">
                    <p class="empty-msg">履歴はまだありません</p>
                </div>
            </section>

            <section class="control-section">
                <div class="card">
                    <h2>ポイント加算</h2>
                    <form id="point-form">
                        <div class="form-group">
                            <label for="host-lab">出題研究室</label>
                            <select id="host-lab" required>
                                <!-- オプションが動的に生成される -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label>正解の研究室を選択</label>
                            <div id="correct-labs-grid" class="labs-checkbox-grid">
                                <!-- チェックボックスが動的に生成される -->
                            </div>
                        </div>
                        <div class="result-preview" id="result-preview">
                            加点されるポイント: <span id="preview-points">0</span>点
                        </div>
                        <button type="submit" class="btn-primary">ポイントを加算する</button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <!-- 研究室名編集モーダル -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3>研究室名の編集</h3>
            <input type="text" id="edit-name-input">
            <div class="modal-actions">
                <button id="modal-cancel" class="btn-secondary">キャンセル</button>
                <button id="modal-save" class="btn-primary">保存</button>
            </div>
        </div>
    </div>

    <div id="qr-modal" class="modal">
        <div class="modal-content">
            <h3>QRコードで共有・同期</h3>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem;">
                このQRコードを他の端末で読み取ると、最新のスコアデータを同期できます。
            </p>
            <div id="qrcode-container" style="display: flex; justify-content: center; background: white; padding: 1rem; border-radius: 1rem; margin-bottom: 1rem;"></div>
            <div style="margin-bottom: 1.5rem;">
                <button id="copy-sync-btn" class="btn-secondary" style="width: 100%; margin-bottom: 0.5rem;">同期コードをコピー</button>
                <button id="import-btn" class="btn-secondary" style="width: 100%;">コードから復元...</button>
            </div>
            <div class="modal-actions">
                <button id="qr-close" class="btn-primary">閉じる</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
